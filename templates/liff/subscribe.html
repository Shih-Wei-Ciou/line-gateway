<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訂閱廟宇</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js CDN -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- LIFF SDK -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    // ── LIFF 初始化 ──────────────────────────────────────────────
    // 在電腦瀏覽器（非 LINE 內建）打開時，自動進入 fake mode，
    // 使用假資料讓設計師/開發者不需要 LINE 就能看到頁面。
    window.FAKE_MODE = false;
    window.FAKE_USER = {
      userId: 'U_fake_0001',
      displayName: '測試使用者（Fake）',
      pictureUrl: 'https://placehold.co/40x40/8B2431/FFD700?text=U',
    };

    async function initLiff() {
      const LIFF_ID = '{{ liff_id }}' || 'LIFF_ID_NOT_SET';
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isInClient()) {
          // 在電腦瀏覽器打開 → fake mode
          window.FAKE_MODE = true;
          console.info('[LIFF] 非 LINE 內部瀏覽器，啟用 fake mode');
        }
      } catch (e) {
        // LIFF ID 未設定或初始化失敗 → 也進 fake mode
        window.FAKE_MODE = true;
        console.warn('[LIFF] 初始化失敗，啟用 fake mode：', e.message);
      }
    }
    initLiff();
  </script>
</head>

<body class="bg-gray-50 min-h-screen" x-data="subscribeApp()">

  <!-- ── 頁首 ── -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="flex items-center px-4 py-3 max-w-lg mx-auto">
      <span class="text-gray-500 mr-3 text-lg">←</span>
      <h1 class="text-base font-semibold text-gray-800">訂閱廟宇</h1>
    </div>
  </header>

  <!-- ── 說明文字 ── -->
  <div class="bg-white border-b border-gray-100 px-4 py-3 max-w-lg mx-auto">
    <p class="text-sm text-gray-500 leading-relaxed">
      選擇你想關注的廟宇，活動通知會透過 LINE 推送給你
    </p>
  </div>

  <!-- ── fake mode 提示條（只在非 LINE 環境顯示）── -->
  <div x-show="isFakeMode"
       class="bg-amber-50 border-b border-amber-200 px-4 py-2 max-w-lg mx-auto">
    <p class="text-xs text-amber-700">
      🖥️ 目前為預覽模式（非 LINE 環境），使用假資料展示
    </p>
  </div>

  <!-- ── 廟宇卡片列表 ── -->
  <main class="max-w-lg mx-auto px-4 py-4 space-y-4">
    <template x-for="temple in temples" :key="temple.id">
      <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">

        <!-- 廟宇圖片 -->
        <img :src="temple.image"
             :alt="temple.name"
             class="w-full h-40 object-cover" />

        <!-- 卡片內容 -->
        <div class="p-4">
          <h2 class="font-semibold text-gray-800 text-base" x-text="temple.name"></h2>
          <p class="text-xs text-gray-400 mt-0.5" x-text="temple.location"></p>
          <p class="text-sm text-gray-600 mt-2 leading-relaxed" x-text="temple.description"></p>

          <!-- 底部：訂閱人數 + 按鈕 -->
          <div class="flex items-center justify-between mt-3">
            <span class="text-xs text-gray-400">
              訂閱者 <span class="font-medium text-gray-600" x-text="temple.subscriberCount"></span> 人
            </span>

            <!-- 未訂閱狀態 -->
            <button x-show="!temple.isSubscribed"
                    @click="subscribe(temple)"
                    class="px-4 py-1.5 rounded-full text-sm font-medium bg-red-700 text-white active:opacity-80">
              訂閱
            </button>

            <!-- 已訂閱狀態 -->
            <button x-show="temple.isSubscribed"
                    @click="confirmUnsubscribe(temple)"
                    class="px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-green-600 border border-green-200">
              ✓ 已訂閱
            </button>
          </div>
        </div>

      </div>
    </template>
  </main>

  <!-- ── 取消訂閱確認 Dialog ── -->
  <div x-show="dialog.visible"
       x-transition.opacity
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 px-6"
       style="display: none;">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xs p-6">
      <h3 class="text-base font-semibold text-gray-800 text-center">取消訂閱</h3>
      <p class="text-sm text-gray-500 text-center mt-2">
        確定要取消訂閱
        <span class="font-medium text-gray-700" x-text="dialog.templeName"></span>
        嗎？
      </p>
      <div class="flex gap-3 mt-5">
        <button @click="dialog.visible = false"
                class="flex-1 py-2 rounded-xl border border-gray-200 text-sm text-gray-600">
          取消
        </button>
        <button @click="unsubscribe()"
                class="flex-1 py-2 rounded-xl bg-red-700 text-white text-sm font-medium">
          確定
        </button>
      </div>
    </div>
  </div>

  <!-- ── Alpine.js 資料與邏輯 ── -->
  <script>
    function subscribeApp() {
      return {
        isFakeMode: false,

        dialog: {
          visible: false,
          templeId: null,
          templeName: '',
        },

        temples: [
          {
            id: 1,
            name: '霧峰南天宮',
            location: '台中市霧峰區',
            description: '主祀玄天上帝，創建於清光緒年間',
            image: 'https://placehold.co/400x200/8B2431/FFD700?text=南天宮',
            subscriberCount: 234,
            isSubscribed: false,
          },
          {
            id: 2,
            name: '彰化天后宮',
            location: '彰化市中山路',
            description: '主祀媽祖，三百年歷史古蹟',
            image: 'https://placehold.co/400x200/8B2431/FFD700?text=天后宮',
            subscriberCount: 567,
            isSubscribed: true,
          },
          {
            id: 3,
            name: '台中文昌祠',
            location: '台中市北區',
            description: '主祀文昌帝君，學子求學必訪',
            image: 'https://placehold.co/400x200/8B2431/FFD700?text=文昌祠',
            subscriberCount: 189,
            isSubscribed: false,
          },
          {
            id: 4,
            name: '草屯敦和宮',
            location: '南投縣草屯鎮',
            description: '主祀關聖帝君，財神祈福勝地',
            image: 'https://placehold.co/400x200/8B2431/FFD700?text=敦和宮',
            subscriberCount: 412,
            isSubscribed: false,
          },
        ],

        init() {
          // 等 LIFF 初始化完再判斷是否 fake mode
          setTimeout(() => {
            this.isFakeMode = window.FAKE_MODE;
          }, 300);
        },

        subscribe(temple) {
          temple.isSubscribed = true;
          temple.subscriberCount += 1;
        },

        confirmUnsubscribe(temple) {
          this.dialog.templeId = temple.id;
          this.dialog.templeName = temple.name;
          this.dialog.visible = true;
        },

        unsubscribe() {
          const temple = this.temples.find(t => t.id === this.dialog.templeId);
          if (temple) {
            temple.isSubscribed = false;
            temple.subscriberCount -= 1;
          }
          this.dialog.visible = false;
        },
      };
    }
  </script>

</body>
</html>
