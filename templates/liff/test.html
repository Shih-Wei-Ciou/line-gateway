<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIFF Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- 右上角狀態徽章 -->
  <div id="badge" class="fixed top-3 right-3 flex items-center gap-1.5 px-3 py-1 rounded-full bg-white border text-sm font-medium">
    <span id="badge-dot" class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
    <span id="badge-text">...</span>
  </div>

  <!-- 主要內容 -->
  <p id="greeting" class="text-2xl font-bold text-center px-6">載入中...</p>

  <script>
    function setReal(name, uid) {
      document.getElementById('greeting').textContent = '歡迎 ' + name + '，UID: ' + uid;
      document.getElementById('badge-dot').className = 'w-2.5 h-2.5 rounded-full bg-green-500';
      document.getElementById('badge-text').textContent = 'Real';
    }

    function setFake(name, uid) {
      document.getElementById('greeting').textContent = '歡迎 ' + name + '，UID: ' + uid;
      document.getElementById('badge-dot').className = 'w-2.5 h-2.5 rounded-full bg-orange-400';
      document.getElementById('badge-text').textContent = 'Fake';
    }

    window.onload = function () {
      liff.init({ liffId: '{{ liff_id }}' })
        .then(function () {
          if (liff.isInClient()) {
            liff.getProfile().then(function (profile) {
              setReal(profile.displayName, profile.userId);
            });
          } else {
            setFake('Fake User', 'U_FAKE_LOCAL_TEST_001');
          }
        })
        .catch(function (err) {
          setFake('Init Failed', 'N/A');
          console.error(err);
        });
    };
  </script>
</body>
</html>
